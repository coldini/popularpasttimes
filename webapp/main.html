<body>
    <div id="root"></div>

    <script src="React_CGF/Home.js"></script>
    <script src="React_CGF/Login.js"></script>
    <script src="React_CGF/Register.js"></script>
    <script src="React_CGF/Profile.js"></script>
    <script src="React_CGF/FindLocation.js"></script>



    <script>
        "use strict";

        const Link = ReactRouterDOM.Link;
        const Route = ReactRouterDOM.Route;


        const Navigation = () => {
            const [activeDropdown, setActiveDropdown] = React.useState(null);

            const toggleDropdown = (dropdownName) => {
                setActiveDropdown((current) => (current === dropdownName ? null : dropdownName));
            };

            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (!event.target.closest('.dropDown')) {
                        setActiveDropdown(null);
                    }
                };

                document.addEventListener('click', handleClickOutside);
                return () => document.removeEventListener('click', handleClickOutside);
            }, []);

            return React.createElement('div', {id: 'titleNav'},
                React.createElement('div', {id: 'title'}, 'Popular Pasttimes'),
                React.createElement('div', {id: 'nav'},
                    React.createElement('div', {className: 'dropDown'},
                        React.createElement(Link, {to: '/home'}, 'Home')
                    ),
                    React.createElement('div', {className: 'dropDown'},
                        React.createElement('button', {
                            type: 'button',
                            className: 'dropHeader',
                            onClick: () => toggleDropdown('account')
                        }, 'Account'),
                        React.createElement('div', {
                            className: `dropContent ${activeDropdown === 'account' ? 'show' : 'hide'}`
                        },
                            React.createElement(Link, {to: '/register'}, 'Register'), React.createElement('br'),
                            React.createElement(Link, {to: '/login'}, 'Log In'), React.createElement('br'),
                            React.createElement(Link, {to: '/profile'}, 'Profile')
                        )
                    ),
                    React.createElement('div', {className: 'dropDown'},
                        React.createElement('button', {
                            type: 'button',
                            className: 'dropHeader',
                            onClick: () => toggleDropdown('find')
                        }, 'Find It!'),
                        React.createElement('div', {
                            className: `dropContent ${activeDropdown === 'find' ? 'show' : 'hide'}`
                        },
                            React.createElement(Link, {to: '/findLocation'}, 'Add Location')
                        )
                    )
                )
            );
        };

        const App = () => (
            React.createElement(ReactRouterDOM.HashRouter, null,
                React.createElement('div', null,

                    React.createElement(Navigation),
                    React.createElement('div', {id: 'content'},
                        React.createElement(Route, {path: '/', exact: true, component: Home}),
                        React.createElement(Route, {path: '/home', component: Home}),
                        React.createElement(Route, {path: '/findLocation', component: FindLocation}),
                        React.createElement(Route, {path: '/register', component: Register}),
                        React.createElement(Route, {path: '/login', component: Login}),
                        React.createElement(Route, {path: '/profile', component: Profile})
                    )
                )
            )
        );

        // render the app into the page root
        const container = document.getElementById('root');

        try {
            // use React 18 createRoot API if available
            if (ReactDOM.createRoot) {
                const root = ReactDOM.createRoot(container);
                root.render(React.createElement(App));
            } else {
                ReactDOM.render(React.createElement(App), container);
            }
        } catch (error) {
            console.error("React rendering failed:", error);
            container.innerHTML = '<h1>React Error: ' + error.message + '</h1>';
        }

    </script>
